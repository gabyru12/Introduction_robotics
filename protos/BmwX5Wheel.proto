# keywords: vehicle/wheel
# Local copy of BmwX5Wheel — adds contactMaterial field so ContactProperties
# in the .wbt can target BmwX5 wheels specifically.

EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/vehicles/protos/abstract/VehicleWheel.proto"
EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/vehicles/protos/abstract/GenericTireAppearance.proto"

PROTO BmwX5Wheel [
  field       SFString name             "BMW X5 wheel"  # Is `VehicleWheel.name`.
  field       SFNode   physics          NULL            # Is `VehicleWheel.physics`.
  field       SFBool   boundingObject   TRUE            # Is `VehicleWheel.boundingObject`.
  field       SFBool   wheelSide        FALSE           # Is `VehicleWheel.wheelSide`.
  field       SFString contactMaterial  "BmwX5Wheels"  # Is `VehicleWheel.contactMaterial`.
  hiddenField SFFloat  tireRadius       0.374           # Is `VehicleWheel.tireRadius`.
]
{
  VehicleWheel {
    name IS name
    thickness 0.25
    tireRadius IS tireRadius
    rimRadius 0.255
    rimBeamWidth 0.07
    centralInnerRadius 0.08
    centralOuterRadius 0.12
    rimBeamThickness 0.08
    rimBeamOffset 0.065
    wheelSide IS wheelSide
    contactMaterial IS contactMaterial
    tireAppearance GenericTireAppearance {
    }
    rimAppearance PBRAppearance {
      baseColor 0.7 0.7 0.7
      roughness 0.5
    }
    physics IS physics
    boundingObject IS boundingObject
    logoSlot [
      Pose {
        translation 0 0.035 0
        rotation 1 0 0 1.570796
        children [
          Shape {
            appearance PBRAppearance {
              metalness 0
              baseColorMap ImageTexture {
                url [
                  "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/vehicles/protos/bmw/textures/bmw_logo_base_color.jpg"
                ]
              }
              roughnessMap ImageTexture {
                url [
                  "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/vehicles/protos/bmw/textures/bmw_logo_roughness.jpg"
                ]
              }
              metalnessMap ImageTexture {
                url [
                  "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/vehicles/protos/bmw/textures/bmw_logo_metalness.jpg"
                ]
              }
              normalMap ImageTexture {
                url [
                  "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/vehicles/protos/bmw/textures/bmw_logo_normal.jpg"
                ]
              }
            }
            geometry Cylinder {
              bottom FALSE
              height 0.21
              radius 0.036
              side FALSE
              subdivision 24
            }
          }
        ]
      }
    ]
  }
}
